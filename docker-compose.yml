services:
  redis:
    image: redis:7
    container_name: notification-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  nginx:
    image: nginx:latest
    container_name: notification-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro